services:
  db:
    image: docker.io/postgres:18-alpine
    container_name: somafm-song-history-db
    restart: always
    environment:
      POSTGRES_USER: somafm
      POSTGRES_PASSWORD: password
      POSTGRES_DB: somafm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
