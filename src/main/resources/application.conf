userAgent = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/92.0.4515.131 Safari/537.36"
timezone = "Europe/Paris"

// This is required in SAVE- and API-mode.
db {
  url = "jdbc:postgresql://localhost:5432/somafm"
  user = "somafm"
  password = "password"
}

// This is required in API-mode.
api {
  port = 7070
  // In the long-running "API mode", recent broadcasts can be persisted periodically.
  scheduler {
    enabled = true
    period = "10m"
    channels = ["dronezone"]
  }
}
