# Workflow run on pull requests against master or develop.
# 1. Run unit tests.
# 2. Run integration tests.
# 3. Package.
# 4. Build image.
name: Pull Request

on:
  pull_request:
    branches:
      - master
      - develop

jobs:
  pipeline:
    uses: ./.github/workflows/_pipeline.yml
    with:
      run-smoke: false
      publish-image: false
