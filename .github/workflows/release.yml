name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit tests
        run: ./mvnw -B --update-snapshots test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run integration tests
        run: ./mvnw -B --update-snapshots test-compile failsafe:integration-test failsafe:verify

  package:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
    outputs:
      jar-artifact-id: ${{ steps.upload-jar.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package application
        run: ./mvnw -B --update-snapshots -Dmaven.test.skip=true package

      - name: Upload packaged JAR
        id: upload-jar
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/somafm-song-history-with-dependencies.jar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish-image:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Tag ${GITHUB_REF_NAME} is not pointing to a commit on master."
            exit 1
          fi

      - name: Download packaged JAR
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/alecigne/somafm-song-history
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Delete packaged JAR artifact
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: Number("${{ needs.package.outputs.jar-artifact-id }}")
            })
