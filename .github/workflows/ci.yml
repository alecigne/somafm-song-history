name: CI

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - master
      - develop
    paths-ignore:
      - "**.md"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      jar-artifact-id: ${{ steps.upload-jar.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify with Maven
        run: ./mvnw -B --update-snapshots verify

      - name: Upload packaged JAR
        id: upload-jar
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/somafm-song-history-with-dependencies.jar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  build-image:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged JAR
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: ./Containerfile
          push: false
          tags: docker.io/alecigne/somafm-song-history:ci

      - name: Delete packaged JAR artifact
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: Number("${{ needs.verify.outputs.jar-artifact-id }}")
            })
